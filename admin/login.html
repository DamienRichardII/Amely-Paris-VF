<!doctype html>
<html lang="fr">
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config/supabase.js"></script>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion admin — Amely Paris</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root{
      --ink:#241914; --muted:#7e6a5f; --line:rgba(36,25,20,.10);
      --gold:#b78a57; --gold-dark:#8b6235; --shadow:0 18px 45px rgba(36,25,20,.08);
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      min-height:100vh; display:grid; place-items:center; padding:18px;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(183,138,87,.10), transparent 28%),
        linear-gradient(180deg, #fbf7f2 0%, #f6efe7 100%);
    }
    .card{
      width:min(100%, 560px); background:rgba(255,255,255,.88); backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.7); border-radius:28px; box-shadow:var(--shadow); padding:28px;
    }
    .eyebrow{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold-dark); margin-bottom:12px}
    h1{
      margin:0 0 10px; font-family:"Cormorant Garamond", Georgia, serif; font-size:54px; font-weight:500; line-height:.92;
    }
    p{margin:0 0 22px; color:var(--muted); line-height:1.6}
    form{display:grid; gap:14px}
    label{display:grid; gap:8px; font-size:14px; font-weight:600}
    input{
      width:100%; min-height:52px; border-radius:16px; border:1px solid var(--line); background:#fff;
      padding:0 16px; font:inherit; color:var(--ink);
    }
    input:focus{outline:none; border-color:rgba(183,138,87,.55); box-shadow:0 0 0 4px rgba(183,138,87,.10)}
    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px}
    .btn{
      min-height:50px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink);
      padding:0 18px; cursor:pointer; font:inherit; display:inline-flex; align-items:center; justify-content:center; text-decoration:none;
    }
    .btn-primary{
      background:linear-gradient(180deg,#c89a63 0%,#a97945 100%); color:#fff; border-color:transparent;
    }
    .msg{
      margin-top:14px; padding:12px 14px; border-radius:14px; font-size:14px; display:none;
    }
    .msg.show{display:block}
    .msg.error{background:#fff0f0; color:#8a2e2e; border:1px solid rgba(153,0,0,.14)}
    .msg.success{background:#eef9f2; color:#256746; border:1px solid rgba(37,103,70,.15)}
    .toplink{display:inline-flex; margin-top:14px; color:var(--muted); text-decoration:none}
    @media (max-width:640px){
      .card{padding:20px; border-radius:22px}
      h1{font-size:42px}
      .actions > *{flex:1 1 100%}
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="card">
    <div class="eyebrow">Administration</div>
    <h1>Connexion<br>admin</h1>
    <p>Accès réservé à la consultation des demandes de devis Amely Paris.</p>

    <form id="loginForm">
      <label>
        Email
        <input type="email" id="email" autocomplete="email" required placeholder="contact.amelyparis@gmail.com">
      </label>

      <label>
        Mot de passe
        <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••••">
      </label>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Se connecter</button>
        <a class="btn" href="admin.html">Retour dashboard</a>
      </div>
    </form>

    <div id="message" class="msg"></div>
    <a class="toplink" href="../index.html">← Retour au site</a>
  </main>

  <script src="config/supabase.js"></script>
  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const message = document.getElementById('message');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');

      function setMessage(text, type) {
        message.textContent = text;
        message.className = 'msg show ' + type;
      }

      async function checkExistingSession() {
        if (!window.supabase) {
          setMessage("Le client Supabase n'est pas chargé.", "error");
          return;
        }
        const { data } = await window.supabase.auth.getSession();
        if (data && data.session) {
          window.location.href = 'admin.html';
        }
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        if (!window.supabase) {
          setMessage("Le client Supabase n'est pas chargé.", "error");
          return;
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        const { data, error } = await window.supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          setMessage(error.message || "Connexion impossible.", "error");
          return;
        }

        setMessage("Connexion réussie. Redirection…", "success");
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 500);
      });

      checkExistingSession();
    })();
  </script>
</body>
</html>
